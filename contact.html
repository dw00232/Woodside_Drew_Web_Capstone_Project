<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Game Review Hub for feedback, questions, or game submissions.">
    <meta name="keywords" content="contact, game review hub, support, gaming">
    <title>Contact | Game Review Hub</title>
    <link rel="stylesheet" href="project.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo-box">
                <a href="index.html"><img src="controller.png" alt="Game Controller" width="100"></a>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Homepage</a></li>
                    <li><a href="gamereviews.html">Game Reviews</a></li>
                    <li><a href="newsandupdates.html">News and Updates</a></li>
                    <li><a href="aboutandcommunity.html">About and Community</a></li>
		    <li><a href="shop.html">Shop</a></li>
		    <li><a href="faq.html">FAQ</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Get In Touch</h1>
            <p class="mission-statement">Have a question? We would love to hear from you.</p>
        </section>

        <section class="content-box">
            <form action="https://webdevbasics.net" method="post" onsubmit="return validate()">
                <label for="user-name">Full Name:</label>
                <input type="text" id="user-name" name="user-name" required>

                <label for="user-email">Email:</label>
                <input type="email" id="user-email" name="user-email" required>

                <label for="subject">Subject:</label>
                <input type="text" id="subject" name="subject" required>

                <label for="message">Your Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Send Submission</button>
            </form>
        </section>
    </main>

    <footer>
        <p>
            <a href="faq.html">Community Guidelines</a> | 
            Contact: <a href="mailto:dw00232@my.westga.edu" target="_blank">dw00232@my.westga.edu</a>
        </p>
    </footer>

    <script>
        function validate() {
            var name = document.getElementById("user-name").value;
            if (name == "") {
                alert("Please enter your name before sending!");
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
